# Production Docker Compose
# Usage: cp .env.docker.example .env.docker && docker-compose -f docker-compose.prod.yml --env-file .env.docker up -d

services:
  nginx:
    image: nginx:stable-alpine
    container_name: oauth2-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - oauth2-backend
      - oauth2-frontend
      - oauth2-admin
    networks:
      - oauth2-net

  oauth2-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
    container_name: oauth2-frontend
    restart: always
    expose:
      - "80"
    networks:
      - oauth2-net

  oauth2-admin:
    build:
      context: ./OAuth2Admin
      dockerfile: Dockerfile
    container_name: oauth2-admin
    restart: always
    expose:
      - "80"
    networks:
      - oauth2-net

  oauth2-backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: oauth2-backend
    restart: always
    expose:
      - "5555"
    depends_on:
      oauth2-postgres:
        condition: service_healthy
      oauth2-redis:
        condition: service_started
    environment:
      - OAUTH2_DB_HOST=${OAUTH2_DB_HOST}
      - OAUTH2_DB_NAME=${OAUTH2_DB_NAME}
      - OAUTH2_DB_PASSWORD=${OAUTH2_DB_PASSWORD}
      - OAUTH2_REDIS_HOST=${OAUTH2_REDIS_HOST}
      - OAUTH2_REDIS_PASSWORD=${OAUTH2_REDIS_PASSWORD}
      - OAUTH2_JWT_KEY_PATH=/app/keys/signing.pem
    volumes:
      - ./deploy/keys:/app/keys:ro
    networks:
      - oauth2-net

  oauth2-postgres:
    image: postgres:15-alpine
    container_name: oauth2-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - oauth2-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  oauth2-redis:
    image: redis:7-alpine
    container_name: oauth2-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    networks:
      - oauth2-net

  prometheus:
    image: prom/prometheus:latest
    container_name: oauth2-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    networks:
      - oauth2-net

networks:
  oauth2-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  promdata:
