services:
  # PostgreSQL for testing
  postgres:
    image: postgres:15-alpine
    container_name: oauth2-postgres-debug
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: oauth_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - oauth2-backend-debug-net

  # Redis for testing
  redis:
    image: redis:7-alpine
    container_name: oauth2-redis-debug
    command: redis-server --requirepass 123456
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - oauth2-backend-debug-net

  # Linux debug environment
  debug-env:
    image: oauth2-backend-debug:v1.9.12
    container_name: oauth2-backend-debug
    volumes:
      # Mount the entire project directory
      - /d/work/development/Repos/backend/drogon-plugin/OAuth2-plugin-example:/app:cached
      # Build cache to speed up rebuilds
      - oauth2-build-cache:/build-cache
    working_dir: /app/OAuth2Backend
    # Keep container running for interactive debugging
    stdin_open: true
    tty: true
    # Depends on databases to be ready
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: /bin/bash
    environment:
      - DISPLAY=${DISPLAY:-}
      # PostgreSQL connection info
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=oauth_test
      # Redis connection info
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=123456
    networks:
      - oauth2-backend-debug-net

volumes:
  oauth2-build-cache:

networks:
  oauth2-backend-debug-net:
    driver: bridge
