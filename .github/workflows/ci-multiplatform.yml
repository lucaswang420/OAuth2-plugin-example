name: Multi-Platform CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      drogon_version:
        description: 'Drogon version'
        required: true
        default: 'v1.9.10'
        type: choice
        options:
          - v1.9.10
          - v1.9.9
          - v1.8.5

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.10"
  POSTGRES_VERSION: "15"
  REDIS_VERSION: "alpine"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux - Ubuntu 22.04
          - os: ubuntu-22.04
            platform: linux
            build_type: Release
            cmake_generator: 'Unix Makefiles'
            package_manager: apt
            artifact_name: linux-gcc-release

          # Windows - Windows Server 2022
          - os: windows-2022
            platform: windows
            build_type: Release
            cmake_generator: 'Visual Studio 17 2022'
            cmake_arch: x64
            package_manager: conan
            artifact_name: windows-msvc2022-release

          # macOS - macos-14 with x86_64
          - os: macos-14
            platform: macos
            build_type: Release
            cmake_generator: 'Unix Makefiles'
            package_manager: brew
            artifact_name: macos-clang-release

    services:
      postgres:
        image: postgres:${{ env.POSTGRES_VERSION }}-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: oauth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:${{ env.REDIS_VERSION }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            uuid-dev \
            libpq-dev \
            libjsoncpp-dev \
            libssl-dev \
            zlib1g-dev \
            build-essential \
            python3-pip

      - name: Cache Conan packages
        if: matrix.platform == 'windows'
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('OAuth2Backend/conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Setup Conan and install dependencies (Windows)
        if: matrix.platform == 'windows'
        run: |
          pip install conan
          conan profile detect --force
          cd OAuth2Backend
          conan install . --output-folder=build --build=missing -s build_type=${{ env.BUILD_TYPE }}

      - name: Install system dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install openssl@1.1 postgresql-client

      - name: Set OpenSSL path (macOS)
        if: matrix.platform == 'macos'
        run: |
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@1.1)" >> $GITHUB_ENV
          echo "Set OPENSSL_ROOT_DIR to: $OPENSSL_ROOT_DIR"

      # Additional steps will be added in subsequent tasks
