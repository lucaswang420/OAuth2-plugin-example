name: Multi-Platform CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      drogon_version:
        description: 'Drogon version'
        required: true
        default: 'v1.9.10'
        type: choice
        options:
          - v1.9.10
          - v1.9.9
          - v1.8.5

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.10"

jobs:
  # ========================================
  # Linux Build with Docker Services
  # ========================================
  build-linux:
    name: Build on Ubuntu 22.04
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: oauth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            uuid-dev \
            libpq-dev \
            libjsoncpp-dev \
            libssl-dev \
            zlib1g-dev \
            build-essential \
            python3-pip \
            libhiredis-dev \
            redis-tools

      - name: Cache Drogon build
        id: cache-drogon
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/drogon
          key: drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-linux-${{ env.BUILD_TYPE }}-${{ hashFiles('OAuth2Backend/conanfile.txt') }}
          restore-keys: |
            drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-linux-${{ env.BUILD_TYPE }}-
            drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-linux-

      - name: Build Drogon
        if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_MYSQL=OFF \
            -DBUILD_POSTGRESQL=ON \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $(nproc)
          sudo cmake --install .

      - name: Configure CMake
        run: |
          cmake -S ${{github.workspace}}/OAuth2Backend -B ${{github.workspace}}/OAuth2Backend/build \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON

      - name: Build project
        run: cmake --build ${{github.workspace}}/OAuth2Backend/build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build with detailed logging on failure
        if: failure()
        run: |
          cmake --build ${{github.workspace}}/OAuth2Backend/build --config ${{ env.BUILD_TYPE }} --verbose 2>&1 | tee build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gcc-release-build-log
          path: build.log

      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 15); do
            pg_isready -h localhost -U test && break
            echo "  Postgres not ready yet (attempt $i/15)..."
            sleep 2
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            redis-cli -h localhost ping && break
            echo "  Redis not ready yet (attempt $i/15)..."
            sleep 2
          done

      - name: Initialize database
        working-directory: ${{github.workspace}}/OAuth2Backend
        env:
          PGPASSWORD: 123456
        run: |
          psql -h localhost -U test -d oauth_test -f sql/001_oauth2_core.sql
          psql -h localhost -U test -d oauth_test -f sql/002_users_table.sql
          psql -h localhost -U test -d oauth_test -f sql/003_rbac_schema.sql

      - name: Run tests
        working-directory: ${{github.workspace}}/OAuth2Backend/build
        env:
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
          OAUTH2_REDIS_PASSWORD: ""
        run: ctest -V -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120

      - name: Prepare artifacts
        if: success()
        run: |
          mkdir -p artifacts
          find ${{github.workspace}}/OAuth2Backend/build -type f \( -executable -o -name "*.so*" \) -exec cp {} artifacts/ \;

      - name: Platform-specific diagnostics
        if: failure()
        run: |
          echo "=== System Libraries ==="
          ldconfig -p | grep libpq || echo "libpq not found"
          ldconfig -p | grep ssl || echo "ssl libraries not found"
          echo "=== Package Config ==="
          pkg-config --libs libpq openssl || echo "pkg-config check failed"

      - name: Report build time and cache statistics
        if: always()
        run: |
          echo "=== Cache Statistics ==="
          echo "Drogon Cache Hit: ${{ steps.cache-drogon.outputs.cache-hit }}"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gcc-release-binaries
          path: |
            ${{github.workspace}}/artifacts/
            ${{github.workspace}}/OAuth2Backend/build/oauth2-server
            ${{github.workspace}}/OAuth2Backend/build/*.so*
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-gcc-release-test-logs
          path: |
            ${{github.workspace}}/OAuth2Backend/build/Testing/
            ${{github.workspace}}/OAuth2Backend/logs/
          retention-days: 7

      - name: Print test environment
        if: always()
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Database Connection ==="
          pg_isready -h localhost -U test
          redis-cli -h localhost ping
          echo "=== Environment Variables ==="
          env | grep OAUTH2 || echo "No OAUTH2 variables set"

  # ========================================
  # Windows Build with Local Databases
  # ========================================
  build-windows:
    name: Build on Windows Server 2022
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Cache Conan packages
        id: cache-conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ hashFiles('OAuth2Backend/conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Setup Conan and install dependencies
        run: |
          pip install conan
          conan profile detect --force
          cd OAuth2Backend
          conan install . --output-folder=build --build=missing -s build_type=${{ env.BUILD_TYPE }}

      - name: Install PostgreSQL and Redis
        run: |
          # Install PostgreSQL using Chocolatey
          choco install postgresql --params '/Password:123456' --yes
          # Install Redis using Chocolatey (may install Memurai as alternative)
          choco install redis-64 --yes

          # PostgreSQL is automatically initialized and started by Chocolatey
          # Wait for PostgreSQL to be ready
          Write-Host "Waiting for PostgreSQL to be ready..."
          $maxAttempts = 30
          for ($i = 1; $i -le $maxAttempts; $i++) {
            & "C:\Program Files\PostgreSQL\14\bin\pg_isready.exe" -h localhost -U postgres 2>&1 | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "PostgreSQL is ready!"
              break
            }
            if ($i -eq $maxAttempts) {
              Write-Host "ERROR: PostgreSQL did not become ready after $maxAttempts attempts"
              exit 1
            }
            Write-Host "Attempt $i/$maxAttempts: PostgreSQL not ready yet, waiting..."
            Start-Sleep -Seconds 2
          }

          # Create database and user
          Write-Host "Creating database and user..."
          & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -U postgres -c "CREATE DATABASE oauth_test;" 2>&1 | Out-Null
          & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -U postgres -c "CREATE USER test WITH PASSWORD '123456';" 2>&1 | Out-Null
          & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE oauth_test TO test;" 2>&1 | Out-Null
          Write-Host "Database and user created successfully!"

          # Start Redis service (may be redis64 or memurai-developer)
          Write-Host "Starting Redis service..."
          $redisStarted = $false
          @('redis64', 'memurai-developer') | ForEach-Object {
            if (-not $redisStarted) {
              try {
                $service = Get-Service -Name $_ -ErrorAction SilentlyContinue
                if ($service) {
                  Start-Service -Name $_ -ErrorAction Stop
                  Write-Host "Redis service '$_' started successfully!"
                  $redisStarted = $true
                }
              } catch {
                Write-Host "Failed to start $_: $_"
              }
            }
          }

          if (-not $redisStarted) {
            Write-Host "WARNING: Could not start Redis service, continuing anyway..."
          }

          # Wait a moment for services to stabilize
          Start-Sleep -Seconds 3

      - name: Cache Drogon build
        id: cache-drogon
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/drogon
          key: drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-windows-${{ env.BUILD_TYPE }}-${{ hashFiles('OAuth2Backend/conanfile.txt') }}
          restore-keys: |
            drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-windows-${{ env.BUILD_TYPE }}-
            drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-windows-

      - name: Build Drogon
        if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX="C:\Drogon" `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_MYSQL=OFF `
            -DBUILD_POSTGRESQL=ON
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $env:NUMBER_OF_PROCESSORS
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Configure CMake
        run: |
          cmake -S ${{github.workspace}}/OAuth2Backend -B ${{github.workspace}}/OAuth2Backend/build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/OAuth2Backend/build/conan_toolchain.cmake `
            -DBUILD_TESTS=ON

      - name: Build project
        run: cmake --build ${{github.workspace}}/OAuth2Backend/build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build with detailed logging on failure
        if: failure()
        run: |
          cmake --build ${{github.workspace}}/OAuth2Backend/build --config ${{ env.BUILD_TYPE }} --verbose 2>&1 | Tee-Object -FilePath build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc2022-release-build-log
          path: build.log

      - name: Wait for services
        run: |
          # Wait for PostgreSQL
          for ($i = 1; $i -le 15; $i++) {
            & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -h localhost -U test -c "SELECT 1" -o $null 2>&1
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Postgres not ready yet (attempt $i/15)..."
            Start-Sleep -Seconds 2
          }

          # Wait for Redis/Memurai
          for ($i = 1; $i -le 15; $i++) {
            redis-cli -h localhost ping 2>&1
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Redis not ready yet (attempt $i/15)..."
            Start-Sleep -Seconds 2
          }

      - name: Initialize database
        working-directory: ${{github.workspace}}/OAuth2Backend
        env:
          PGPASSWORD: 123456
        run: |
          psql -h localhost -U test -d oauth_test -f sql/001_oauth2_core.sql
          psql -h localhost -U test -d oauth_test -f sql/002_users_table.sql
          psql -h localhost -U test -d oauth_test -f sql/003_rbac_schema.sql
        shell: bash

      - name: Run tests
        working-directory: ${{github.workspace}}/OAuth2Backend/build
        env:
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
          OAUTH2_REDIS_PASSWORD: ""
        run: ctest -V -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120
        shell: bash

      - name: Prepare artifacts
        if: success()
        run: |
          mkdir artifacts
          find ${{github.workspace}}/OAuth2Backend/build/${{ env.BUILD_TYPE }} -type f \( -name "*.exe" -o -name "*.dll" \) -exec cp {} artifacts/ \;
        shell: bash

      - name: Platform-specific diagnostics
        if: failure()
        run: |
          echo "=== MSVC Environment ==="
          cl 2>&1 | grep "Microsoft" || echo "MSVC not found"
          echo "=== Conan Information ==="
          conan --version
          conan list "OAuth2Backend/*" || echo "No Conan packages found"
        shell: bash

      - name: Report build time and cache statistics
        if: always()
        run: |
          echo "=== Cache Statistics ==="
          echo "Drogon Cache Hit: ${{ steps.cache-drogon.outputs.cache-hit }}"
          echo "Conan Cache Hit: ${{ steps.cache-conan.outputs.cache-hit }}"
        shell: bash

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc2022-release-binaries
          path: |
            ${{github.workspace}}/artifacts/
            ${{github.workspace}}/OAuth2Backend/build/${{ env.BUILD_TYPE }}/*.exe
            ${{github.workspace}}/OAuth2Backend/build/${{ env.BUILD_TYPE }}/*.dll
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc2022-release-test-logs
          path: |
            ${{github.workspace}}/OAuth2Backend/build/Testing/
            ${{github.workspace}}/OAuth2Backend/logs/
          retention-days: 7

      - name: Print test environment
        if: always()
        run: |
          echo "=== System Info ==="
          echo "Windows"
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Database Connection ==="
          psql -h localhost -U test -c "SELECT 1" || echo "psql not available"
          redis-cli -h localhost ping || echo "redis-cli not available"
          echo "=== Environment Variables ==="
          env | grep OAUTH2 || echo "No OAUTH2 variables set"
        shell: bash

  # ========================================
  # macOS Build with Local Databases
  # ========================================
  build-macos:
    name: Build on macOS 14
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          brew install openssl@1.1 redis postgresql@14 hiredis jsoncpp
          # Start PostgreSQL service
          brew services start postgresql@14
          # Wait for service to be ready
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..15}; do
            if pg_isready -h localhost > /dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... (attempt $i/15)"
            sleep 2
          done
          # Create database and user
          psql -d postgres -c "CREATE DATABASE oauth_test;"
          psql -d postgres -c "CREATE USER test WITH PASSWORD '123456';"
          psql -d postgres -c "GRANT ALL PRIVILEGES ON DATABASE oauth_test TO test;"
          # Start Redis
          brew services start redis
          # Wait a moment for Redis to start
          sleep 2

      - name: Set OpenSSL path
        run: |
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@1.1)" >> $GITHUB_ENV
          echo "Set OPENSSL_ROOT_DIR to: $OPENSSL_ROOT_DIR"

      - name: Cache Drogon build
        id: cache-drogon
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/drogon
          key: drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-macos-${{ env.BUILD_TYPE }}-${{ hashFiles('OAuth2Backend/conanfile.txt') }}
          restore-keys: |
            drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-macos-${{ env.BUILD_TYPE }}-
            drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-macos-

      - name: Build Drogon
        if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@1.1)" \
            -DCMAKE_FIND_FRAMEWORK=LAST \
            -DBUILD_EXAMPLES=OFF \
            -DBUILD_MYSQL=OFF \
            -DBUILD_POSTGRESQL=ON
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $(sysctl -n hw.ncpu)
          sudo cmake --install .

      - name: Configure CMake
        run: |
          cmake -S ${{github.workspace}}/OAuth2Backend -B ${{github.workspace}}/OAuth2Backend/build \
            -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_OSX_ARCHITECTURES="x86_64" \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@1.1)" \
            -DCMAKE_FIND_FRAMEWORK=LAST \
            -DBUILD_TESTS=ON

      - name: Build project
        run: cmake --build ${{github.workspace}}/OAuth2Backend/build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Build with detailed logging on failure
        if: failure()
        run: |
          cmake --build ${{github.workspace}}/OAuth2Backend/build --config ${{ env.BUILD_TYPE }} --verbose 2>&1 | tee build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-clang-release-build-log
          path: build.log

      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 15); do
            pg_isready -h localhost -U test && break
            echo "  Postgres not ready yet (attempt $i/15)..."
            sleep 2
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 15); do
            redis-cli -h localhost ping && break
            echo "  Redis not ready yet (attempt $i/15)..."
            sleep 2
          done

      - name: Initialize database
        working-directory: ${{github.workspace}}/OAuth2Backend
        env:
          PGPASSWORD: 123456
        run: |
          psql -h localhost -U test -d oauth_test -f sql/001_oauth2_core.sql
          psql -h localhost -U test -d oauth_test -f sql/002_users_table.sql
          psql -h localhost -U test -d oauth_test -f sql/003_rbac_schema.sql

      - name: Run tests
        working-directory: ${{github.workspace}}/OAuth2Backend/build
        env:
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
          OAUTH2_REDIS_PASSWORD: ""
        run: ctest -V -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120

      - name: Prepare artifacts
        if: success()
        run: |
          mkdir -p artifacts
          # Copy shared libraries
          find ${{github.workspace}}/OAuth2Backend/build -type f -name "*.dylib*" -exec cp {} artifacts/ \;
          # Copy executables
          find ${{github.workspace}}/OAuth2Backend/build -type f -perm +111 -exec cp {} artifacts/ \;

      - name: Platform-specific diagnostics
        if: failure()
        run: |
          echo "=== Architecture Check ==="
          echo "Current: $(uname -m)"
          echo "=== Homebrew Packages ==="
          brew list openssl@1.1 || echo "OpenSSL not found"
          brew --prefix openssl@1.1 || echo "OpenSSL prefix not found"
          echo "=== CMake Cache ==="
          grep CMAKE_OSX_ARCHITECTURES ${{github.workspace}}/OAuth2Backend/build/CMakeCache.txt || echo "Architecture not set in cache"

      - name: Report build time and cache statistics
        if: always()
        run: |
          echo "=== Cache Statistics ==="
          echo "Drogon Cache Hit: ${{ steps.cache-drogon.outputs.cache-hit }}"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: macos-clang-release-binaries
          path: |
            ${{github.workspace}}/artifacts/
            ${{github.workspace}}/OAuth2Backend/build/oauth2-server
            ${{github.workspace}}/OAuth2Backend/build/*.dylib*
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-clang-release-test-logs
          path: |
            ${{github.workspace}}/OAuth2Backend/build/Testing/
            ${{github.workspace}}/OAuth2Backend/logs/
          retention-days: 7

      - name: Print test environment
        if: always()
        run: |
          echo "=== System Info ==="
          uname -a
          echo "=== CMake Version ==="
          cmake --version
          echo "=== Database Connection ==="
          pg_isready -h localhost -U test
          redis-cli -h localhost ping
          echo "=== Environment Variables ==="
          env | grep OAUTH2 || echo "No OAUTH2 variables set"
