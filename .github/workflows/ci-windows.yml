name: Windows CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.12"

jobs:
  build-and-test:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      # --- Conan dependency cache ---
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-v3-cpp17-${{ hashFiles('OAuth2Backend/conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Configure CMake using Conan
        working-directory: ${{github.workspace}}/OAuth2Backend
        run: |
          # Remove old build directory to avoid cache conflicts
          Remove-Item -Path build -Recurse -Force -ErrorAction SilentlyContinue
          conan install . --output-folder=build --build=openssl --build=missing -s build_type=${{env.BUILD_TYPE}} -s compiler.cppstd=17

      # --- Drogon build cache ---
      - name: Cache Drogon build
        id: cache-drogon
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/drogon
          key: drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-v5-cpp17-cmake-policy-${{ env.BUILD_TYPE }}

      - name: Skip database installation
        run: Write-Host "Skipping PostgreSQL and Redis installation to speed up CI"

      - name: Build Drogon
        if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_CXX_STANDARD=17 `
            -DCMAKE_INSTALL_PREFIX="C:\Drogon" `
            -DCMAKE_TOOLCHAIN_FILE="${{github.workspace}}/OAuth2Backend/build/conan_toolchain.cmake" `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_MYSQL=OFF `
            -DBUILD_POSTGRESQL=ON
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $env:NUMBER_OF_PROCESSORS
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Skip database initialization
        run: Write-Host "Skipping database initialization - databases not installed"

      - name: Configure Project CMake
        working-directory: ${{github.workspace}}/OAuth2Backend
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_CXX_STANDARD=17 -DCMAKE_TOOLCHAIN_FILE="${{github.workspace}}/OAuth2Backend/build/conan_toolchain.cmake" -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_PREFIX_PATH="C:\Drogon" -DDrogon_DIR="C:\Drogon\lib\cmake\Drogon" -DBUILD_TESTS=ON

      - name: Build
        working-directory: ${{github.workspace}}/OAuth2Backend
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/OAuth2Backend/build
        env:
          OAUTH2_REDIS_PASSWORD: ""
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
        run: ctest -V -C ${{env.BUILD_TYPE}} --output-on-failure --timeout 120
        shell: bash

      # --- Upload logs on failure for debugging ---
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs
          path: |
            ${{github.workspace}}/OAuth2Backend/build/Testing/
            ${{github.workspace}}/OAuth2Backend/logs/
          retention-days: 7
