name: Windows CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  BUILD_TYPE: Release
  DROGON_VERSION: "v1.9.10"

jobs:
  build-and-test:
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force

      # --- Conan dependency cache ---
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-v2-${{ hashFiles('OAuth2Backend/conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-

      - name: Configure CMake using Conan
        working-directory: ${{github.workspace}}/OAuth2Backend
        run: |
          # Remove old build directory to avoid cache conflicts
          Remove-Item -Path build -Recurse -Force -ErrorAction SilentlyContinue
          conan install . --output-folder=build --build=openssl --build=missing -s build_type=${{env.BUILD_TYPE}}

      # --- Drogon build cache ---
      - name: Cache Drogon build
        id: cache-drogon
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/drogon
          key: drogon-${{ runner.os }}-${{ env.DROGON_VERSION }}-windows-${{ env.BUILD_TYPE }}

      - name: Install PostgreSQL and Redis
        run: |
          # Install PostgreSQL using Chocolatey
          choco install postgresql --params '/Password:123456' --yes
          # Install Redis using Chocolatey (may install Memurai as alternative)
          choco install redis-64 --yes

          # PostgreSQL is automatically initialized and started by Chocolatey
          # Wait for PostgreSQL to be ready
          Write-Host "Waiting for PostgreSQL to be ready..."
          $maxAttempts = 30
          for ($i = 1; $i -le $maxAttempts; $i++) {
            & "C:\Program Files\PostgreSQL\14\bin\pg_isready.exe" -h localhost -U postgres 2>&1 | Out-Null
            if ($LASTEXITCODE -eq 0) {
              Write-Host "PostgreSQL is ready!"
              break
            }
            if ($i -eq $maxAttempts) {
              Write-Host "ERROR: PostgreSQL did not become ready after $maxAttempts attempts"
              exit 1
            }
            Write-Host "Attempt $i/${maxAttempts} - PostgreSQL not ready yet, waiting..."
            Start-Sleep -Seconds 2
          }

          # Create database and user
          Write-Host "Creating database and user..."
          & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -U postgres -c "CREATE DATABASE oauth_test;" 2>&1 | Out-Null
          & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -U postgres -c "CREATE USER test WITH PASSWORD '123456';" 2>&1 | Out-Null
          & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE oauth_test TO test;" 2>&1 | Out-Null
          Write-Host "Database and user created successfully!"

          # Start Redis service (may be redis64 or memurai-developer)
          Write-Host "Starting Redis service..."
          $redisStarted = $false
          @('redis64', 'memurai-developer') | ForEach-Object {
            if (-not $redisStarted) {
              try {
                $service = Get-Service -Name $_ -ErrorAction SilentlyContinue
                if ($service) {
                  Start-Service -Name $_ -ErrorAction Stop
                  Write-Host "Redis service '$_' started successfully!"
                  $redisStarted = $true
                }
              } catch {
                Write-Host "Failed to start ${_}: ${_}"
              }
            }
          }

          if (-not $redisStarted) {
            Write-Host "WARNING: Could not start Redis service, continuing anyway..."
          }

          # Wait a moment for services to stabilize
          Start-Sleep -Seconds 3

      - name: Build Drogon
        if: steps.cache-drogon.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch ${{ env.DROGON_VERSION }} https://github.com/drogonframework/drogon
          cd drogon
          git submodule update --init --recursive
          mkdir build && cd build
          cmake .. `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_INSTALL_PREFIX="C:\Drogon" `
            -DBUILD_EXAMPLES=OFF `
            -DBUILD_MYSQL=OFF `
            -DBUILD_POSTGRESQL=ON
          cmake --build . --config ${{ env.BUILD_TYPE }} --parallel $env:NUMBER_OF_PROCESSORS
          cmake --install . --config ${{ env.BUILD_TYPE }}

      - name: Wait for services
        run: |
          # Wait for PostgreSQL
          for ($i = 1; $i -le 15; $i++) {
            & "C:\Program Files\PostgreSQL\14\bin\psql.exe" -h localhost -U test -c "SELECT 1" -o $null 2>&1
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Postgres not ready yet (attempt $i/15)..."
            Start-Sleep -Seconds 2
          }

          # Wait for Redis/Memurai
          for ($i = 1; $i -le 15; $i++) {
            redis-cli -h localhost ping 2>&1
            if ($LASTEXITCODE -eq 0) { break }
            Write-Host "Redis not ready yet (attempt $i/15)..."
            Start-Sleep -Seconds 2
          }

      - name: Initialize Database
        working-directory: ${{github.workspace}}/OAuth2Backend
        env:
          PGPASSWORD: 123456
        run: |
          psql -h localhost -U test -d oauth_test -f sql/001_oauth2_core.sql
          psql -h localhost -U test -d oauth_test -f sql/002_users_table.sql
          psql -h localhost -U test -d oauth_test -f sql/003_rbac_schema.sql
        shell: bash

      - name: Configure Project CMake
        working-directory: ${{github.workspace}}/OAuth2Backend
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DCMAKE_TOOLCHAIN_FILE=build/conan_toolchain.cmake -DBUILD_TESTS=ON

      - name: Build
        working-directory: ${{github.workspace}}/OAuth2Backend
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/OAuth2Backend/build
        env:
          OAUTH2_REDIS_PASSWORD: ""
          OAUTH2_DB_HOST: "127.0.0.1"
          OAUTH2_REDIS_HOST: "127.0.0.1"
        run: ctest -V -C ${{env.BUILD_TYPE}} --output-on-failure --timeout 120
        shell: bash

      # --- Upload logs on failure for debugging ---
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-logs
          path: |
            ${{github.workspace}}/OAuth2Backend/build/Testing/
            ${{github.workspace}}/OAuth2Backend/logs/
          retention-days: 7
