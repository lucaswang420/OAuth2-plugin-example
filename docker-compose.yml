
services:
  oauth2-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runtime
    container_name: oauth2-frontend-release
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - oauth2-backend-release
    networks:
      - oauth2-net

  oauth2-backend-release:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runtime
    container_name: oauth2-backend-release
    restart: always
    ports:
      - "5555:5555"
    depends_on:
      oauth2-postgres-release:
        condition: service_healthy
      oauth2-redis-release:
        condition: service_started
    environment:
      - OAUTH2_DB_HOST=oauth2-postgres-release
      - OAUTH2_DB_NAME=oauth_test
      - OAUTH2_DB_PASSWORD=123456
      - OAUTH2_REDIS_HOST=oauth2-redis-release
      - OAUTH2_REDIS_PASSWORD=redis_secret_pass
      - OAUTH2_VUE_CLIENT_SECRET=123456
    networks:
      - oauth2-net

  oauth2-postgres-release:
    image: postgres:15-alpine
    container_name: oauth2-postgres-release
    restart: always
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=123456
      - POSTGRES_DB=oauth_test
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./OAuth2Server/sql:/docker-entrypoint-initdb.d
    networks:
      - oauth2-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d oauth_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  oauth2-redis-release:
    image: redis:7-alpine
    container_name: oauth2-redis-release
    restart: always
    command: redis-server --requirepass redis_secret_pass
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    networks:
      - oauth2-net

  prometheus:
    image: prom/prometheus:latest
    container_name: oauth2-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - oauth2-net

networks:
  oauth2-net:
    driver: bridge

volumes:
  pgdata:
    name: oauth2-plugin-example_postgres_prod
  redisdata:
    name: oauth2-plugin-example_redis_prod
